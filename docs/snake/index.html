<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNAKE</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  font-family: 'Courier New', monospace;
}
#screen {
  position: relative;
  width: 640px;
  height: 480px;
  background: #000;
  box-shadow: 0 0 40px rgba(0, 255, 0, 0.15), 0 0 80px rgba(0, 255, 0, 0.08), inset 0 0 60px rgba(0, 0, 0, 0.4);
  border-radius: 12px;
  overflow: hidden;
}
canvas {
  display: block;
  width: 640px;
  height: 480px;
  image-rendering: pixelated;
}
#scanlines {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 2px,
    rgba(0, 0, 0, 0.15) 2px,
    rgba(0, 0, 0, 0.15) 4px
  );
  pointer-events: none;
  z-index: 2;
}
#crt-flicker {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 3;
  border-radius: 12px;
  background: radial-gradient(ellipse at center, transparent 60%, rgba(0, 0, 0, 0.35) 100%);
}
</style>
</head>
<body>
<div id="screen">
  <canvas id="c" width="640" height="480"></canvas>
  <div id="scanlines"></div>
  <div id="crt-flicker"></div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const COLS = 30;
const ROWS = 22;
const CELL = Math.floor(640 / COLS);
const OFFSET_X = Math.floor((640 - COLS * CELL) / 2);
const OFFSET_Y = 40;
const GRID_H = ROWS * CELL;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(freq, dur, type = 'square', vol = 0.12) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}

function sfxEat() { playSound(520, 0.1); playSound(780, 0.1); }
function sfxBonus() { playSound(660, 0.08); setTimeout(() => playSound(880, 0.08), 50); setTimeout(() => playSound(1100, 0.12), 100); }
function sfxDie() {
  playSound(220, 0.3, 'sawtooth', 0.15);
  setTimeout(() => playSound(110, 0.4, 'sawtooth', 0.12), 150);
}
function sfxMove() { playSound(140, 0.03, 'square', 0.03); }

let snake, dir, nextDir, food, bonusFood, bonusTimer, score, lives, highScore, speed, speedLevel, foodCount, gameOver, gameStarted, lastTick, paused;

highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;

function init() {
  const startX = Math.floor(COLS / 2);
  const startY = Math.floor(ROWS / 2);
  snake = [{ x: startX, y: startY }, { x: startX - 1, y: startY }, { x: startX - 2, y: startY }];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  lives = 3;
  speed = 150;
  speedLevel = 1;
  foodCount = 0;
  gameOver = false;
  gameStarted = false;
  paused = false;
  bonusFood = null;
  bonusTimer = null;
  placeFood();
  lastTick = 0;
}

function placeFood() {
  let pos;
  do {
    pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y) || (bonusFood && bonusFood.x === pos.x && bonusFood.y === pos.y));
  food = pos;
}

function placeBonusFood() {
  if (bonusFood) return;
  let pos;
  do {
    pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y) || (food.x === pos.x && food.y === pos.y));
  bonusFood = { x: pos.x, y: pos.y, spawn: performance.now() };
  if (bonusTimer) clearTimeout(bonusTimer);
  bonusTimer = setTimeout(() => { bonusFood = null; bonusTimer = null; }, 5000);
}

function resetAfterDeath() {
  const startX = Math.floor(COLS / 2);
  const startY = Math.floor(ROWS / 2);
  snake = [{ x: startX, y: startY }, { x: startX - 1, y: startY }, { x: startX - 2, y: startY }];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  speed = 150;
  speedLevel = 1;
  foodCount = 0;
  bonusFood = null;
  if (bonusTimer) { clearTimeout(bonusTimer); bonusTimer = null; }
  placeFood();
}

function update() {
  dir = nextDir;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS || snake.some(s => s.x === head.x && s.y === head.y)) {
    sfxDie();
    lives--;
    if (lives <= 0) {
      gameOver = true;
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('snakeHighScore', highScore);
      }
      return;
    }
    resetAfterDeath();
    return;
  }

  snake.unshift(head);

  let ate = false;
  if (head.x === food.x && head.y === food.y) {
    sfxEat();
    score += 10;
    foodCount++;
    if (foodCount % 5 === 0) {
      speed = Math.max(50, speed - 15);
      speedLevel = Math.floor(foodCount / 5) + 1;
    }
    placeFood();
    ate = true;
    if (Math.random() < 0.3 && !bonusFood) {
      placeBonusFood();
    }
  } else if (bonusFood && head.x === bonusFood.x && head.y === bonusFood.y) {
    sfxBonus();
    score += 50;
    bonusFood = null;
    if (bonusTimer) { clearTimeout(bonusTimer); bonusTimer = null; }
    ate = true;
  }

  if (!ate) snake.pop();

  if (score > highScore) {
    highScore = score;
    localStorage.setItem('snakeHighScore', highScore);
  }
}

function drawCell(x, y, color, glow) {
  const px = OFFSET_X + x * CELL;
  const py = OFFSET_Y + y * CELL;
  if (glow) {
    ctx.shadowColor = color;
    ctx.shadowBlur = 8;
  }
  ctx.fillStyle = color;
  ctx.fillRect(px + 1, py + 1, CELL - 2, CELL - 2);
  ctx.shadowBlur = 0;
}

function draw(now) {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, 640, 480);

  ctx.strokeStyle = '#0a1a0a';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath();
    ctx.moveTo(OFFSET_X + x * CELL, OFFSET_Y);
    ctx.lineTo(OFFSET_X + x * CELL, OFFSET_Y + GRID_H);
    ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath();
    ctx.moveTo(OFFSET_X, OFFSET_Y + y * CELL);
    ctx.lineTo(OFFSET_X + COLS * CELL, OFFSET_Y + y * CELL);
    ctx.stroke();
  }

  ctx.strokeStyle = '#0f3f0f';
  ctx.lineWidth = 2;
  ctx.strokeRect(OFFSET_X - 1, OFFSET_Y - 1, COLS * CELL + 2, ROWS * CELL + 2);

  for (let i = snake.length - 1; i >= 0; i--) {
    const brightness = Math.floor(255 - (i / snake.length) * 120);
    const color = i === 0 ? '#00ff00' : `rgb(0, ${brightness}, 0)`;
    drawCell(snake[i].x, snake[i].y, color, i === 0);
  }

  const foodPulse = 0.7 + 0.3 * Math.sin(now / 200);
  const g = Math.floor(200 * foodPulse);
  drawCell(food.x, food.y, `rgb(0, ${g}, 0)`, true);

  if (bonusFood) {
    const elapsed = now - bonusFood.spawn;
    const remaining = Math.max(0, 5000 - elapsed);
    const alpha = remaining < 1500 ? 0.3 + 0.7 * (remaining / 1500) * Math.abs(Math.sin(now / 100)) : 0.7 + 0.3 * Math.sin(now / 150);
    ctx.globalAlpha = alpha;
    drawCell(bonusFood.x, bonusFood.y, '#ffd700', true);
    ctx.globalAlpha = 1;
  }

  ctx.fillStyle = '#00cc00';
  ctx.font = '14px Courier New';
  ctx.textAlign = 'left';
  ctx.shadowColor = '#00ff00';
  ctx.shadowBlur = 4;
  ctx.fillText(`SCORE: ${score}`, OFFSET_X, 20);
  ctx.textAlign = 'center';
  ctx.fillText(`LIVES: ${'♥'.repeat(lives)}`, 320, 20);
  ctx.fillText(`SPD: ${speedLevel}`, 320, 35);
  ctx.textAlign = 'right';
  ctx.fillText(`HI: ${highScore}`, OFFSET_X + COLS * CELL, 20);
  ctx.shadowBlur = 0;

  if (!gameStarted && !gameOver) {
    drawOverlay('SNAKE', 'PRESS ANY ARROW KEY TO START');
  }

  if (gameOver) {
    drawOverlay('GAME OVER', `FINAL SCORE: ${score}  —  PRESS ENTER TO RESTART`);
  }
}

function drawOverlay(title, sub) {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
  ctx.fillRect(0, 0, 640, 480);
  ctx.fillStyle = '#00ff00';
  ctx.shadowColor = '#00ff00';
  ctx.shadowBlur = 12;
  ctx.font = 'bold 48px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText(title, 320, 220);
  ctx.font = '14px Courier New';
  ctx.shadowBlur = 6;
  ctx.fillText(sub, 320, 260);
  ctx.shadowBlur = 0;
}

document.addEventListener('keydown', (e) => {
  if (audioCtx.state === 'suspended') audioCtx.resume();

  if (gameOver && e.key === 'Enter') {
    init();
    gameStarted = true;
    return;
  }

  const keyMap = {
    ArrowUp: { x: 0, y: -1 },
    ArrowDown: { x: 0, y: 1 },
    ArrowLeft: { x: -1, y: 0 },
    ArrowRight: { x: 1, y: 0 }
  };

  if (keyMap[e.key]) {
    e.preventDefault();
    const nd = keyMap[e.key];
    if (nd.x !== -dir.x || nd.y !== -dir.y) {
      nextDir = nd;
    }
    if (!gameStarted && !gameOver) {
      gameStarted = true;
      nextDir = nd;
      dir = nd;
    }
  }
});

function loop(now) {
  requestAnimationFrame(loop);
  if (gameStarted && !gameOver) {
    if (now - lastTick >= speed) {
      sfxMove();
      update();
      lastTick = now;
    }
  }
  draw(now);
}

init();
requestAnimationFrame(loop);
</script>
</body>
</html>
