<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASH - Don't Let It Drop</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0500;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
  font-family: monospace;
}
#wrapper {
  position: relative;
  box-shadow: 0 0 60px rgba(255, 140, 0, 0.3), 0 0 120px rgba(255, 80, 0, 0.1);
  border-radius: 4px;
}
canvas {
  display: block;
  image-rendering: pixelated;
}
#wrapper::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 0, 0, 0.15) 2px,
    rgba(0, 0, 0, 0.15) 4px
  );
  pointer-events: none;
  border-radius: 4px;
}
#touch-btn {
  display: none;
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255, 140, 0, 0.2);
  border: 2px solid rgba(255, 140, 0, 0.5);
  color: #ff8c00;
  font-family: monospace;
  font-size: 16px;
  padding: 15px 40px;
  border-radius: 8px;
  cursor: pointer;
  z-index: 10;
}
@media (pointer: coarse) {
  #touch-btn { display: block; }
}
</style>
</head>
<body>
<div id="wrapper">
<canvas id="game"></canvas>
</div>
<button id="touch-btn">TAP TO FLICK</button>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 640, H = 480;
canvas.width = W; canvas.height = H;

function resize() {
  const ratio = W / H;
  let w = window.innerWidth, h = window.innerHeight;
  if (w / h > ratio) { canvas.style.height = h + 'px'; canvas.style.width = (h * ratio) + 'px'; }
  else { canvas.style.width = w + 'px'; canvas.style.height = (w / ratio) + 'px'; }
}
resize();
window.addEventListener('resize', resize);

// Audio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
  const now = audioCtx.currentTime;
  if (type === 'sizzle') {
    const noise = audioCtx.createBufferSource();
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.05;
    noise.buffer = buf;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'highpass'; filter.frequency.value = 3000;
    const gain = audioCtx.createGain();
    gain.gain.value = 0.3;
    noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
    noise.start(now); noise.stop(now + 0.1);
  } else if (type === 'flick') {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(800, now);
    osc.frequency.exponentialRampToValueAtTime(200, now + 0.15);
    gain.gain.setValueAtTime(0.3, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(now); osc.stop(now + 0.15);
  } else if (type === 'drop') {
    const notes = [300, 250, 200, 150];
    notes.forEach((f, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.value = f;
      gain.gain.setValueAtTime(0.2, now + i * 0.2);
      gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.2 + 0.19);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(now + i * 0.2); osc.stop(now + i * 0.2 + 0.2);
    });
  } else if (type === 'light') {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(400, now);
    osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(now); osc.stop(now + 0.1);
  }
}

// Game state
let state = 'title'; // title, playing, flicked, dropped, gameover
let lives = 3, score = 0, round = 0;
let highScore = parseInt(localStorage.getItem('ash_highscore')) || 0;
let ashLength = 0, maxAsh = 100, ashFallSpeed = 0.3;
let wobble = 0, wobbleSpeed = 0, wobbleAmp = 0;
let crackLevel = 0;
let shakeX = 0, shakeY = 0;
let sizzleTimer = 0;
let windActive = false, windForce = 0, windDir = 0;
let particles = [];
let flickAnim = 0, dropAnim = 0;
let expression = 0; // 0=calm, 1=nervous, 2=sweating, 3=panic
let newCigAnim = 0;
let jumpAnim = 0;

function resetRound() {
  ashLength = 0;
  wobble = 0; wobbleSpeed = 0; wobbleAmp = 0;
  crackLevel = 0;
  flickAnim = 0; dropAnim = 0;
  expression = 0;
  newCigAnim = 30;
  jumpAnim = 0;
  particles = [];
  round++;
  ashFallSpeed = 0.3 + round * 0.05;
  maxAsh = Math.max(60, 100 - round * 3);
  windActive = round > 2 && Math.random() < 0.4;
  windForce = 0; windDir = 0;
  playSound('light');
}

function startGame() {
  lives = 3; score = 0; round = 0;
  state = 'playing';
  resetRound();
}

// Input
function flick() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (state === 'title') { startGame(); return; }
  if (state === 'gameover') { state = 'title'; return; }
  if (state === 'playing' && ashLength > 5) {
    score += Math.floor(ashLength);
    flickAnim = 20;
    state = 'flicked';
    playSound('flick');
    for (let i = 0; i < 15; i++) {
      particles.push({
        x: 320 + wobble, y: 280,
        vx: (Math.random() - 0.5) * 4,
        vy: Math.random() * 3 + 1,
        life: 30 + Math.random() * 20,
        size: 2 + Math.random() * 3
      });
    }
  }
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); flick(); }
});
canvas.addEventListener('touchstart', e => { e.preventDefault(); flick(); });
canvas.addEventListener('click', flick);
document.getElementById('touch-btn').addEventListener('touchstart', e => { e.preventDefault(); flick(); });
document.getElementById('touch-btn').addEventListener('click', flick);

// Draw pixel character
function drawCharacter(x, y, expr, jumping) {
  const jy = jumping ? -jumping * 3 : 0;
  const py = y + jy;

  // Bench
  ctx.fillStyle = '#8B4513';
  ctx.fillRect(x - 40, y + 50, 100, 8);
  ctx.fillRect(x - 35, y + 58, 6, 20);
  ctx.fillRect(x + 50, y + 58, 6, 20);
  ctx.fillRect(x - 40, y + 30, 6, 20);
  ctx.fillRect(x + 54, y + 30, 6, 20);
  ctx.fillRect(x - 40, y + 28, 100, 6);

  // Legs
  ctx.fillStyle = '#333';
  ctx.fillRect(x, py + 40, 12, 10);
  ctx.fillRect(x + 15, py + 40, 12, 10);

  // Body
  ctx.fillStyle = '#555';
  ctx.fillRect(x - 2, py + 10, 32, 30);

  // Head
  ctx.fillStyle = '#e8a860';
  ctx.fillRect(x + 5, py - 15, 20, 24);

  // Hair
  ctx.fillStyle = '#333';
  ctx.fillRect(x + 3, py - 18, 24, 8);

  // Eyes
  if (expr >= 3) {
    // Panic - wide eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 9, py - 6, 6, 6);
    ctx.fillRect(x + 18, py - 6, 6, 6);
    ctx.fillStyle = '#000';
    ctx.fillRect(x + 11, py - 4, 3, 3);
    ctx.fillRect(x + 20, py - 4, 3, 3);
  } else if (expr >= 1) {
    // Nervous
    ctx.fillStyle = '#000';
    ctx.fillRect(x + 10, py - 5, 5, 3);
    ctx.fillRect(x + 19, py - 5, 5, 3);
    // Eyebrows raised
    ctx.fillRect(x + 9, py - 9, 6, 2);
    ctx.fillRect(x + 18, py - 9, 6, 2);
  } else {
    // Calm - relaxed half-closed
    ctx.fillStyle = '#000';
    ctx.fillRect(x + 10, py - 4, 5, 2);
    ctx.fillRect(x + 19, py - 4, 5, 2);
  }

  // Mouth
  ctx.fillStyle = '#000';
  ctx.fillRect(x + 12, py + 4, 8, 2);

  // Sweat drops
  if (expr >= 2) {
    ctx.fillStyle = '#66ccff';
    ctx.fillRect(x + 26, py - 8, 3, 5);
    if (expr >= 3) {
      ctx.fillRect(x + 3, py - 5, 3, 5);
      ctx.fillRect(x + 28, py + 2, 3, 5);
    }
  }

  // Arm holding cigarette
  ctx.fillStyle = '#e8a860';
  ctx.fillRect(x + 26, py + 15, 20, 6);
  ctx.fillRect(x + 44, py + 10, 6, 10);

  return { cigX: x + 48, cigY: py + 10 };
}

function drawCigarette(x, y, ashLen, wob) {
  // Cigarette body
  ctx.fillStyle = '#fff';
  ctx.fillRect(x, y, 30, 5);
  // Filter
  ctx.fillStyle = '#c87533';
  ctx.fillRect(x, y, 8, 5);
  // Burning tip
  ctx.fillStyle = '#ff4400';
  ctx.fillRect(x + 30, y, 3, 5);
  // Glow
  ctx.fillStyle = '#ff8800';
  ctx.fillRect(x + 30, y + 1, 3, 3);

  // Ash
  if (ashLen > 0) {
    const segments = Math.floor(ashLen / 3);
    for (let i = 0; i < segments; i++) {
      const segX = x + 33 + i * 3;
      const droop = (i / segments) * (ashLen / maxAsh) * 8 + Math.sin(wob + i * 0.3) * wobbleAmp * (i / segments);
      const gray = 180 - i * 2;
      ctx.fillStyle = `rgb(${gray},${gray},${gray - 10})`;
      ctx.fillRect(segX, y + droop, 3, 5);

      // Cracks
      if (crackLevel > 0 && i > segments * 0.5 && Math.random() < crackLevel * 0.3) {
        ctx.fillStyle = '#333';
        ctx.fillRect(segX + 1, y + droop + 1, 1, 3);
      }
    }

    // Smoke
    if (Math.random() < 0.4) {
      ctx.fillStyle = 'rgba(180, 180, 180, 0.3)';
      const smokeX = x + 33 + Math.random() * 5;
      const smokeY = y - 5 - Math.random() * 10;
      ctx.fillRect(smokeX, smokeY, 3, 3);
    }
  }
}

function drawParticles() {
  particles.forEach(p => {
    const alpha = p.life / 50;
    const gray = 150 + Math.random() * 50;
    ctx.fillStyle = `rgba(${gray},${gray},${gray - 20},${alpha})`;
    ctx.fillRect(p.x, p.y, p.size, p.size);
  });
}

function updateParticles() {
  particles = particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life--;
    return p.life > 0;
  });
}

function drawHUD() {
  ctx.fillStyle = '#ff8c00';
  ctx.font = '16px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`SCORE: ${score}`, 20, 30);
  ctx.fillText(`HIGH: ${highScore}`, 20, 50);
  ctx.textAlign = 'right';
  ctx.fillText(`ROUND: ${round}`, W - 20, 30);
  // Lives as cigarette icons
  for (let i = 0; i < lives; i++) {
    ctx.fillStyle = '#fff';
    ctx.fillRect(W - 80 + i * 25, 40, 15, 4);
    ctx.fillStyle = '#c87533';
    ctx.fillRect(W - 80 + i * 25, 40, 5, 4);
    ctx.fillStyle = '#ff4400';
    ctx.fillRect(W - 80 + i * 25 + 15, 40, 2, 4);
  }
  // Wind indicator
  if (windActive) {
    ctx.fillStyle = '#66aaff';
    ctx.font = '12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('~ WIND ~', W / 2, 30);
  }
}

function drawTitle() {
  ctx.fillStyle = '#0a0500';
  ctx.fillRect(0, 0, W, H);

  // Title
  ctx.fillStyle = '#ff8c00';
  ctx.font = 'bold 72px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('ASH', W / 2, 150);

  // Tagline
  ctx.fillStyle = '#cc6600';
  ctx.font = '18px monospace';
  ctx.fillText("don't let it drop", W / 2, 190);

  // Decorative ash
  ctx.fillStyle = '#888';
  for (let i = 0; i < 8; i++) {
    const ax = W / 2 - 60 + i * 16;
    const ay = 210 + Math.sin(Date.now() / 500 + i) * 3;
    ctx.fillRect(ax, ay, 10, 4);
  }

  // Instructions
  ctx.fillStyle = '#ff8c00';
  ctx.font = '14px monospace';
  ctx.fillText('HOW TO PLAY:', W / 2, 270);
  ctx.fillStyle = '#cc8844';
  ctx.font = '12px monospace';
  ctx.fillText('Wait for the ash to grow... but not too long!', W / 2, 295);
  ctx.fillText('Longer ash = more points', W / 2, 315);
  ctx.fillText('If it falls on your pants, you lose a life!', W / 2, 335);

  ctx.fillStyle = '#ff8c00';
  ctx.font = '14px monospace';
  ctx.fillText('CONTROLS:', W / 2, 370);
  ctx.fillStyle = '#cc8844';
  ctx.font = '12px monospace';
  ctx.fillText('PC: SPACE to flick ash', W / 2, 395);
  ctx.fillText('Mobile: TAP anywhere to flick', W / 2, 415);

  // Start prompt
  ctx.fillStyle = Math.sin(Date.now() / 300) > 0 ? '#ff8c00' : '#663300';
  ctx.font = '16px monospace';
  ctx.fillText('Press ENTER or TAP to start', W / 2, 455);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#ff6600';
    ctx.font = '14px monospace';
    ctx.fillText(`HIGH SCORE: ${highScore}`, W / 2, 60);
  }
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(10, 5, 0, 0.85)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#ff4400';
  ctx.font = 'bold 48px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', W / 2, 180);

  ctx.fillStyle = '#ff8c00';
  ctx.font = '24px monospace';
  ctx.fillText(`FINAL SCORE: ${score}`, W / 2, 240);
  ctx.fillText(`ROUNDS: ${round}`, W / 2, 280);

  if (score >= highScore && score > 0) {
    ctx.fillStyle = '#ffcc00';
    ctx.font = '20px monospace';
    ctx.fillText('NEW HIGH SCORE!', W / 2, 330);
  }

  ctx.fillStyle = Math.sin(Date.now() / 300) > 0 ? '#ff8c00' : '#663300';
  ctx.font = '16px monospace';
  ctx.fillText('Press SPACE or TAP to continue', W / 2, 400);
}

// Main loop
let lastTime = 0;
function gameLoop(time) {
  const dt = Math.min((time - lastTime) / 16.67, 3);
  lastTime = time;

  if (state === 'title') {
    drawTitle();
    requestAnimationFrame(gameLoop);
    return;
  }

  if (state === 'gameover') {
    drawGameOver();
    requestAnimationFrame(gameLoop);
    return;
  }

  // Update
  if (state === 'playing') {
    if (newCigAnim > 0) {
      newCigAnim -= dt;
    } else {
      ashLength += ashFallSpeed * dt;

      // Wobble
      const danger = ashLength / maxAsh;
      wobbleAmp = danger * 4 + (danger > 0.7 ? Math.sin(time / 100) * 2 : 0);
      wobbleSpeed += (Math.random() - 0.5) * 0.1 * dt;
      wobble += wobbleSpeed * dt;
      wobble *= 0.95;

      // Wind
      if (windActive) {
        windDir += (Math.random() - 0.5) * 0.02 * dt;
        windForce = Math.sin(time / 800) * 3;
        wobble += windForce * windDir * danger * dt * 0.3;
      }

      // Expression
      if (danger < 0.3) expression = 0;
      else if (danger < 0.55) expression = 1;
      else if (danger < 0.8) expression = 2;
      else expression = 3;

      // Cracks
      crackLevel = Math.max(0, danger - 0.6);

      // Screen shake
      if (danger > 0.7) {
        shakeX = (Math.random() - 0.5) * danger * 4;
        shakeY = (Math.random() - 0.5) * danger * 3;
      } else {
        shakeX *= 0.9; shakeY *= 0.9;
      }

      // Sizzle sound
      sizzleTimer -= dt;
      if (sizzleTimer <= 0) {
        playSound('sizzle');
        sizzleTimer = 15 - danger * 8;
      }

      // Ash falls!
      if (ashLength >= maxAsh) {
        state = 'dropped';
        dropAnim = 60;
        jumpAnim = 10;
        lives--;
        playSound('drop');
        for (let i = 0; i < 25; i++) {
          particles.push({
            x: 330 + Math.random() * 30, y: 290,
            vx: (Math.random() - 0.5) * 5,
            vy: Math.random() * 2 + 2,
            life: 40 + Math.random() * 30,
            size: 2 + Math.random() * 4
          });
        }
      }
    }
  }

  if (state === 'flicked') {
    flickAnim -= dt;
    updateParticles();
    if (flickAnim <= 0) {
      state = 'playing';
      resetRound();
    }
  }

  if (state === 'dropped') {
    dropAnim -= dt;
    jumpAnim = Math.max(0, jumpAnim - dt * 0.3);
    updateParticles();
    if (dropAnim <= 0) {
      if (lives <= 0) {
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('ash_highscore', highScore);
        }
        state = 'gameover';
      } else {
        state = 'playing';
        resetRound();
      }
    }
  }

  // Draw
  ctx.save();
  ctx.translate(shakeX, shakeY);

  // Background
  ctx.fillStyle = '#0a0500';
  ctx.fillRect(-5, -5, W + 10, H + 10);

  // Floor
  ctx.fillStyle = '#1a0f00';
  ctx.fillRect(0, 380, W, 100);
  ctx.fillStyle = '#2a1500';
  for (let i = 0; i < W; i += 40) {
    ctx.fillRect(i, 380, 38, 2);
  }

  // Wall
  ctx.fillStyle = '#0f0800';
  ctx.fillRect(0, 0, W, 380);
  // Bricks
  ctx.fillStyle = '#1a0c00';
  for (let row = 0; row < 12; row++) {
    for (let col = 0; col < 10; col++) {
      const offset = row % 2 === 0 ? 0 : 32;
      ctx.fillRect(col * 64 + offset, row * 32, 62, 30);
    }
  }

  // Character
  const charX = 220, charY = 300;
  const charResult = drawCharacter(charX, charY, expression, state === 'dropped' ? jumpAnim : 0);

  // Cigarette
  if (state === 'playing' && newCigAnim <= 0) {
    drawCigarette(charResult.cigX, charResult.cigY, ashLength, wobble);
  } else if (state === 'playing' && newCigAnim > 0) {
    drawCigarette(charResult.cigX, charResult.cigY, 0, 0);
  } else if (state === 'flicked') {
    drawCigarette(charResult.cigX, charResult.cigY, 0, 0);
  } else if (state === 'dropped') {
    drawCigarette(charResult.cigX, charResult.cigY, 0, 0);
    // Ash on pants
    ctx.fillStyle = '#666';
    ctx.fillRect(charX + 5, charY + 35 + (state === 'dropped' ? -jumpAnim * 3 : 0), 20, 5);
  }

  // Particles
  drawParticles();

  // Ash length bar
  if (state === 'playing' && newCigAnim <= 0) {
    const barW = 100, barH = 8;
    const barX = W / 2 - barW / 2, barY = H - 40;
    ctx.fillStyle = '#222';
    ctx.fillRect(barX, barY, barW, barH);
    const fill = ashLength / maxAsh;
    const barColor = fill < 0.5 ? '#ff8c00' : fill < 0.8 ? '#ff4400' : '#ff0000';
    ctx.fillStyle = barColor;
    ctx.fillRect(barX, barY, barW * fill, barH);
    ctx.strokeStyle = '#ff8c0044';
    ctx.strokeRect(barX, barY, barW, barH);
    ctx.fillStyle = '#cc8844';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('DANGER', W / 2, barY - 4);
  }

  // Round notification
  if (state === 'playing' && newCigAnim > 15) {
    ctx.fillStyle = '#ff8c00';
    ctx.font = 'bold 24px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`ROUND ${round}`, W / 2, 100);
    if (windActive) {
      ctx.font = '14px monospace';
      ctx.fillStyle = '#66aaff';
      ctx.fillText('WIND ROUND!', W / 2, 125);
    }
  }

  // Score popup on flick
  if (state === 'flicked' && flickAnim > 10) {
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`+${Math.floor(ashLength)}`, W / 2, 200 - (20 - flickAnim) * 2);
  }

  // HUD
  drawHUD();

  ctx.restore();

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
