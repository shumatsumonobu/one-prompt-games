<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON VOID - Space Shooter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Courier New',monospace}
canvas{display:block;width:100%;height:100%;image-rendering:pixelated}
#ui-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#scanlines{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:11;
background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.15) 2px,rgba(0,0,0,0.15) 4px)}
#crt-glow{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9;
box-shadow:inset 0 0 120px rgba(0,255,255,0.07),inset 0 0 60px rgba(0,255,255,0.04);
border-radius:8px}
#start-screen{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;
align-items:center;justify-content:center;z-index:20;background:rgba(0,0,0,0.85)}
#start-screen h1{font-size:clamp(2rem,8vw,5rem);color:#0ff;text-shadow:0 0 20px #0ff,0 0 40px #0ff,0 0 80px #08f;
letter-spacing:0.3em;margin-bottom:0.5em;animation:pulse 2s ease-in-out infinite}
#start-screen .sub{color:#0af;font-size:clamp(0.8rem,2vw,1.2rem);margin-bottom:2em;letter-spacing:0.2em}
#start-screen .prompt{color:#fff;font-size:clamp(0.9rem,2vw,1.3rem);animation:blink 1s step-end infinite}
#start-screen .controls{color:#888;font-size:clamp(0.6rem,1.5vw,0.9rem);margin-top:2em;text-align:center;line-height:2}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.7}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
#game-over-screen{position:fixed;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;
align-items:center;justify-content:center;z-index:20;background:rgba(0,0,0,0.85)}
#game-over-screen h1{font-size:clamp(2rem,7vw,4rem);color:#f44;text-shadow:0 0 20px #f44,0 0 40px #f00;
letter-spacing:0.2em;margin-bottom:0.3em}
#game-over-screen .score-display{color:#0ff;font-size:clamp(1rem,3vw,1.8rem);margin:0.5em 0}
#game-over-screen .prompt{color:#fff;font-size:clamp(0.9rem,2vw,1.3rem);animation:blink 1s step-end infinite;margin-top:1em}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="scanlines"></div>
<div id="crt-glow"></div>

<div id="start-screen">
  <h1>NEON VOID</h1>
  <div class="sub">SPACE SHOOTER</div>
  <div class="prompt">PRESS ENTER OR TAP TO START</div>
  <div class="controls">
    ARROW KEYS / WASD - MOVE<br>
    SPACE - SHOOT<br>
    P - PAUSE
  </div>
</div>

<div id="game-over-screen">
  <h1>GAME OVER</h1>
  <div class="score-display" id="final-score"></div>
  <div class="score-display" id="high-score-display"></div>
  <div class="prompt">PRESS ENTER OR TAP TO RESTART</div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const startScreen = document.getElementById('start-screen');
const gameOverScreen = document.getElementById('game-over-screen');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Audio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
  const now = audioCtx.currentTime;
  const g = audioCtx.createGain();
  g.connect(audioCtx.destination);
  const o = audioCtx.createOscillator();
  o.connect(g);

  switch (type) {
    case 'shoot':
      o.type = 'square';
      o.frequency.setValueAtTime(880, now);
      o.frequency.exponentialRampToValueAtTime(220, now + 0.1);
      g.gain.setValueAtTime(0.15, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      o.start(now); o.stop(now + 0.1);
      break;
    case 'explosion':
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(200, now);
      o.frequency.exponentialRampToValueAtTime(30, now + 0.3);
      g.gain.setValueAtTime(0.2, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      o.start(now); o.stop(now + 0.3);
      break;
    case 'hit':
      o.type = 'square';
      o.frequency.setValueAtTime(150, now);
      o.frequency.exponentialRampToValueAtTime(50, now + 0.15);
      g.gain.setValueAtTime(0.2, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      o.start(now); o.stop(now + 0.15);
      break;
    case 'powerup':
      o.type = 'sine';
      o.frequency.setValueAtTime(440, now);
      o.frequency.exponentialRampToValueAtTime(1320, now + 0.2);
      g.gain.setValueAtTime(0.15, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
      o.start(now); o.stop(now + 0.25);
      break;
    case 'boss':
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(80, now);
      o.frequency.exponentialRampToValueAtTime(40, now + 0.5);
      g.gain.setValueAtTime(0.25, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
      o.start(now); o.stop(now + 0.5);
      break;
    case 'life-lost':
      o.type = 'square';
      o.frequency.setValueAtTime(440, now);
      o.frequency.setValueAtTime(330, now + 0.1);
      o.frequency.setValueAtTime(220, now + 0.2);
      o.frequency.setValueAtTime(110, now + 0.3);
      g.gain.setValueAtTime(0.2, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
      o.start(now); o.stop(now + 0.5);
      break;
    case 'wave':
      o.type = 'triangle';
      o.frequency.setValueAtTime(330, now);
      o.frequency.setValueAtTime(440, now + 0.1);
      o.frequency.setValueAtTime(550, now + 0.2);
      o.frequency.setValueAtTime(660, now + 0.3);
      g.gain.setValueAtTime(0.15, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
      o.start(now); o.stop(now + 0.5);
      break;
  }
}

// State
const keys = {};
let gameState = 'start';
let score = 0;
let lives = 3;
let wave = 0;
let highScore = parseInt(localStorage.getItem('neonvoid_highscore')) || 0;
let paused = false;
let invulnTimer = 0;
let waveTimer = 0;
let waveTextTimer = 0;
let waveTextStr = '';
let bossActive = false;
let boss = null;
let shakeTimer = 0;

const player = { x: 0, y: 0, w: 24, h: 28, speed: 5, shootTimer: 0, shootDelay: 12, spreadShot: 0, shield: 0, speedBoost: 0 };
let bullets = [];
let enemies = [];
let enemyBullets = [];
let particles = [];
let powerups = [];
let stars = [];

function initStars() {
  stars = [];
  for (let i = 0; i < 150; i++) {
    stars.push({ x: Math.random() * W, y: Math.random() * H, s: Math.random() * 2 + 0.5, v: Math.random() * 2 + 1 });
  }
}

function resetGame() {
  score = 0;
  lives = 3;
  wave = 0;
  paused = false;
  invulnTimer = 0;
  waveTimer = 60;
  waveTextTimer = 0;
  bossActive = false;
  boss = null;
  shakeTimer = 0;
  player.x = W / 2;
  player.y = H - 80;
  player.shootTimer = 0;
  player.spreadShot = 0;
  player.shield = 0;
  player.speedBoost = 0;
  player.shootDelay = 12;
  bullets = [];
  enemies = [];
  enemyBullets = [];
  particles = [];
  powerups = [];
  initStars();
}

function spawnWave() {
  wave++;
  waveTextStr = bossActive ? '' : `WAVE ${wave}`;
  waveTextTimer = 120;
  if (wave > 0 && wave % 3 === 0) {
    // Boss wave
    spawnBoss();
    playSound('boss');
    return;
  }
  playSound('wave');
  const count = 5 + wave * 2;
  const types = ['drone'];
  if (wave >= 2) types.push('zigzag');
  if (wave >= 3) types.push('bomber');
  for (let i = 0; i < count; i++) {
    const type = types[Math.floor(Math.random() * types.length)];
    if (type === 'bomber' && i % 5 === 0) {
      spawnVFormation(i);
    } else {
      spawnEnemy(type, i * 30);
    }
  }
}

function spawnEnemy(type, delay) {
  const e = {
    type, x: Math.random() * (W - 60) + 30, y: -40 - (delay || 0),
    w: 20, h: 20, hp: 1, speed: 1.5 + wave * 0.2, timer: 0, shootTimer: Math.random() * 120,
    phase: Math.random() * Math.PI * 2
  };
  if (type === 'zigzag') { e.hp = 2; e.w = 22; e.h = 22; e.speed = 1.2 + wave * 0.15; }
  if (type === 'bomber') { e.hp = 3; e.w = 26; e.h = 26; e.speed = 1 + wave * 0.1; }
  enemies.push(e);
}

function spawnVFormation(baseDelay) {
  const cx = Math.random() * (W - 200) + 100;
  const positions = [[-40, 0], [40, 0], [-80, -30], [80, -30], [0, 30]];
  positions.forEach(([ox, oy]) => {
    const e = {
      type: 'bomber', x: cx + ox, y: -60 + oy - (baseDelay || 0),
      w: 26, h: 26, hp: 3, speed: 1 + wave * 0.1, timer: 0,
      shootTimer: Math.random() * 120, phase: 0
    };
    enemies.push(e);
  });
}

function spawnBoss() {
  bossActive = true;
  const bossHp = 30 + wave * 10;
  boss = {
    x: W / 2, y: -80, w: 80, h: 60, hp: bossHp, maxHp: bossHp,
    speed: 2, phase: 0, shootTimer: 0, pattern: 0, patternTimer: 0,
    entering: true
  };
  waveTextStr = 'WARNING: BOSS';
  waveTextTimer = 180;
}

function spawnParticles(x, y, color, count, speed) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = Math.random() * (speed || 3) + 1;
    particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 30 + Math.random() * 20, maxLife: 50, color, size: Math.random() * 3 + 1 });
  }
}

function spawnPowerup(x, y) {
  if (Math.random() > 0.25) return;
  const types = ['spread', 'shield', 'speed'];
  const type = types[Math.floor(Math.random() * types.length)];
  powerups.push({ x, y, type, w: 16, h: 16, vy: 1.5, timer: 0 });
}

// Input
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Enter' || e.code === 'Space') {
    if (gameState === 'start') { startGame(); e.preventDefault(); }
    else if (gameState === 'gameover' && e.code === 'Enter') { startGame(); e.preventDefault(); }
  }
  if (e.code === 'KeyP' && gameState === 'playing') { paused = !paused; }
  if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

let touchX = -1, touchY = -1, touching = false;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (gameState === 'start') { startGame(); return; }
  if (gameState === 'gameover') { startGame(); return; }
  touching = true;
  touchX = e.touches[0].clientX;
  touchY = e.touches[0].clientY;
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  touchX = e.touches[0].clientX;
  touchY = e.touches[0].clientY;
});
canvas.addEventListener('touchend', e => { e.preventDefault(); touching = false; });

canvas.addEventListener('click', () => {
  if (gameState === 'start') startGame();
  else if (gameState === 'gameover') startGame();
});

function startGame() {
  audioCtx.resume();
  resetGame();
  gameState = 'playing';
  startScreen.style.display = 'none';
  gameOverScreen.style.display = 'none';
}

// Update
function update() {
  if (gameState !== 'playing' || paused) return;

  // Stars
  stars.forEach(s => {
    s.y += s.v;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
  });

  // Player movement
  let speed = player.speed + (player.speedBoost > 0 ? 3 : 0);
  let dx = 0, dy = 0;
  if (keys['ArrowLeft'] || keys['KeyA']) dx = -1;
  if (keys['ArrowRight'] || keys['KeyD']) dx = 1;
  if (keys['ArrowUp'] || keys['KeyW']) dy = -1;
  if (keys['ArrowDown'] || keys['KeyS']) dy = 1;

  if (touching) {
    const tdx = touchX - player.x;
    const tdy = touchY - player.y;
    const dist = Math.sqrt(tdx * tdx + tdy * tdy);
    if (dist > 10) { dx = tdx / dist; dy = tdy / dist; }
  }

  if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }
  player.x += dx * speed;
  player.y += dy * speed;
  player.x = Math.max(player.w, Math.min(W - player.w, player.x));
  player.y = Math.max(player.h, Math.min(H - player.h, player.y));

  // Timers
  if (invulnTimer > 0) invulnTimer--;
  if (player.spreadShot > 0) player.spreadShot--;
  if (player.shield > 0) player.shield--;
  if (player.speedBoost > 0) player.speedBoost--;
  if (waveTextTimer > 0) waveTextTimer--;
  if (shakeTimer > 0) shakeTimer--;

  // Shooting
  player.shootTimer--;
  if ((keys['Space'] || touching) && player.shootTimer <= 0) {
    player.shootTimer = player.shootDelay;
    playSound('shoot');
    if (player.spreadShot > 0) {
      bullets.push({ x: player.x, y: player.y - player.h, vx: 0, vy: -8, w: 3, h: 10 });
      bullets.push({ x: player.x - 10, y: player.y - player.h + 5, vx: -2, vy: -7.5, w: 3, h: 10 });
      bullets.push({ x: player.x + 10, y: player.y - player.h + 5, vx: 2, vy: -7.5, w: 3, h: 10 });
    } else {
      bullets.push({ x: player.x, y: player.y - player.h, vx: 0, vy: -8, w: 3, h: 10 });
    }
  }

  // Bullets
  bullets = bullets.filter(b => {
    b.x += b.vx;
    b.y += b.vy;
    return b.y > -20 && b.y < H + 20 && b.x > -20 && b.x < W + 20;
  });

  // Enemies
  enemies = enemies.filter(e => {
    e.timer++;
    e.shootTimer--;
    switch (e.type) {
      case 'drone':
        e.y += e.speed;
        break;
      case 'zigzag':
        e.y += e.speed * 0.8;
        e.x += Math.sin(e.timer * 0.05 + e.phase) * 3;
        break;
      case 'bomber':
        e.y += e.speed * 0.6;
        break;
    }
    e.x = Math.max(e.w, Math.min(W - e.w, e.x));

    if (e.shootTimer <= 0) {
      e.shootTimer = 80 + Math.random() * 60;
      const angle = Math.atan2(player.y - e.y, player.x - e.x);
      enemyBullets.push({ x: e.x, y: e.y + e.h, vx: Math.cos(angle) * 3, vy: Math.sin(angle) * 3, w: 4, h: 4 });
    }

    return e.y < H + 50;
  });

  // Boss
  if (boss) {
    if (boss.entering) {
      boss.y += 1.5;
      if (boss.y >= 80) { boss.entering = false; }
    } else {
      boss.phase += 0.02;
      boss.x = W / 2 + Math.sin(boss.phase) * (W / 3);
      boss.y = 80 + Math.sin(boss.phase * 0.7) * 30;

      boss.shootTimer--;
      boss.patternTimer++;
      if (boss.patternTimer > 180) { boss.pattern = (boss.pattern + 1) % 3; boss.patternTimer = 0; }

      if (boss.shootTimer <= 0) {
        switch (boss.pattern) {
          case 0: // Aimed shots
            boss.shootTimer = 25;
            const a = Math.atan2(player.y - boss.y, player.x - boss.x);
            enemyBullets.push({ x: boss.x, y: boss.y + boss.h, vx: Math.cos(a) * 4, vy: Math.sin(a) * 4, w: 5, h: 5 });
            break;
          case 1: // Spread
            boss.shootTimer = 40;
            for (let i = -2; i <= 2; i++) {
              const sa = Math.PI / 2 + i * 0.3;
              enemyBullets.push({ x: boss.x, y: boss.y + boss.h, vx: Math.cos(sa) * 3.5, vy: Math.sin(sa) * 3.5, w: 4, h: 4 });
            }
            break;
          case 2: // Ring
            boss.shootTimer = 50;
            for (let i = 0; i < 12; i++) {
              const ra = (Math.PI * 2 / 12) * i;
              enemyBullets.push({ x: boss.x, y: boss.y, vx: Math.cos(ra) * 3, vy: Math.sin(ra) * 3, w: 4, h: 4 });
            }
            break;
        }
      }
    }
  }

  // Enemy bullets
  enemyBullets = enemyBullets.filter(b => {
    b.x += b.vx;
    b.y += b.vy;
    return b.y > -20 && b.y < H + 20 && b.x > -20 && b.x < W + 20;
  });

  // Powerups
  powerups = powerups.filter(p => {
    p.y += p.vy;
    p.timer++;
    return p.y < H + 20;
  });

  // Particles
  particles = particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.97;
    p.vy *= 0.97;
    p.life--;
    return p.life > 0;
  });

  // Collision: bullets vs enemies
  bullets = bullets.filter(b => {
    let hit = false;
    enemies = enemies.filter(e => {
      if (hit) return true;
      if (Math.abs(b.x - e.x) < e.w + b.w && Math.abs(b.y - e.y) < e.h + b.h) {
        hit = true;
        e.hp--;
        if (e.hp <= 0) {
          const pts = e.type === 'drone' ? 100 : e.type === 'zigzag' ? 200 : 300;
          score += pts;
          spawnParticles(e.x, e.y, e.type === 'drone' ? '#f84' : e.type === 'zigzag' ? '#f4f' : '#ff4', 12, 4);
          playSound('explosion');
          spawnPowerup(e.x, e.y);
          return false;
        } else {
          spawnParticles(b.x, b.y, '#fff', 4, 2);
          playSound('hit');
        }
      }
      return true;
    });

    // bullets vs boss
    if (!hit && boss && !boss.entering) {
      if (Math.abs(b.x - boss.x) < boss.w + b.w && Math.abs(b.y - boss.y) < boss.h + b.h) {
        hit = true;
        boss.hp--;
        spawnParticles(b.x, b.y, '#ff0', 3, 2);
        if (boss.hp <= 0) {
          score += 2000 + wave * 500;
          spawnParticles(boss.x, boss.y, '#f84', 40, 6);
          spawnParticles(boss.x, boss.y, '#ff0', 30, 8);
          playSound('explosion');
          shakeTimer = 20;
          boss = null;
          bossActive = false;
          waveTimer = 120;
        } else {
          playSound('hit');
        }
      }
    }
    return !hit;
  });

  // Collision: enemy bullets vs player
  if (invulnTimer <= 0) {
    enemyBullets = enemyBullets.filter(b => {
      if (Math.abs(b.x - player.x) < player.w && Math.abs(b.y - player.y) < player.h) {
        if (player.shield > 0) {
          player.shield = 0;
          spawnParticles(player.x, player.y, '#0ff', 10, 3);
          playSound('hit');
        } else {
          loseLife();
        }
        return false;
      }
      return true;
    });
  }

  // Collision: enemies vs player
  if (invulnTimer <= 0) {
    enemies.forEach(e => {
      if (Math.abs(e.x - player.x) < (e.w + player.w) * 0.7 && Math.abs(e.y - player.y) < (e.h + player.h) * 0.7) {
        if (player.shield > 0) {
          player.shield = 0;
          spawnParticles(player.x, player.y, '#0ff', 10, 3);
          playSound('hit');
        } else {
          loseLife();
        }
      }
    });
  }

  // Collision: boss vs player
  if (invulnTimer <= 0 && boss) {
    if (Math.abs(boss.x - player.x) < (boss.w + player.w) * 0.7 && Math.abs(boss.y - player.y) < (boss.h + player.h) * 0.7) {
      if (player.shield > 0) {
        player.shield = 0;
      } else {
        loseLife();
      }
    }
  }

  // Collision: powerups vs player
  powerups = powerups.filter(p => {
    if (Math.abs(p.x - player.x) < player.w + p.w && Math.abs(p.y - player.y) < player.h + p.h) {
      playSound('powerup');
      switch (p.type) {
        case 'spread': player.spreadShot = 600; break;
        case 'shield': player.shield = 900; break;
        case 'speed': player.speedBoost = 480; break;
      }
      spawnParticles(p.x, p.y, p.type === 'spread' ? '#f0f' : p.type === 'shield' ? '#0ff' : '#0f0', 8, 3);
      return false;
    }
    return true;
  });

  // Wave management
  if (!bossActive && enemies.length === 0 && waveTimer > 0) {
    waveTimer--;
    if (waveTimer <= 0) {
      spawnWave();
    }
  }
  if (!bossActive && enemies.length === 0 && waveTimer <= 0 && wave > 0) {
    waveTimer = 90;
  }
}

function loseLife() {
  lives--;
  invulnTimer = 120;
  shakeTimer = 10;
  spawnParticles(player.x, player.y, '#0ff', 20, 5);
  playSound('life-lost');
  if (lives <= 0) {
    gameState = 'gameover';
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('neonvoid_highscore', highScore);
    }
    document.getElementById('final-score').textContent = `SCORE: ${score}`;
    document.getElementById('high-score-display').textContent = `HIGH SCORE: ${highScore}`;
    gameOverScreen.style.display = 'flex';
  }
}

// Draw
function draw() {
  ctx.save();
  if (shakeTimer > 0) {
    ctx.translate(Math.random() * 6 - 3, Math.random() * 6 - 3);
  }

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // Stars
  stars.forEach(s => {
    const a = s.s / 2.5;
    ctx.fillStyle = `rgba(255,255,255,${a})`;
    ctx.fillRect(s.x, s.y, s.s, s.s);
  });

  if (gameState !== 'playing' && gameState !== 'gameover') { ctx.restore(); return; }

  // Particles
  particles.forEach(p => {
    const a = p.life / p.maxLife;
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Powerups
  powerups.forEach(p => {
    const glow = Math.sin(p.timer * 0.1) * 0.3 + 0.7;
    ctx.globalAlpha = glow;
    ctx.save();
    ctx.translate(p.x, p.y);
    const color = p.type === 'spread' ? '#f0f' : p.type === 'shield' ? '#0ff' : '#0f0';
    ctx.strokeStyle = color;
    ctx.shadowColor = color;
    ctx.shadowBlur = 10;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, 10, 0, Math.PI * 2);
    ctx.stroke();
    ctx.font = 'bold 12px Courier New';
    ctx.fillStyle = color;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.type === 'spread' ? 'S' : p.type === 'shield' ? 'D' : 'F', 0, 0);
    ctx.restore();
    ctx.globalAlpha = 1;
  });

  // Bullets
  bullets.forEach(b => {
    ctx.fillStyle = '#0ff';
    ctx.shadowColor = '#0ff';
    ctx.shadowBlur = 8;
    ctx.fillRect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h);
  });
  ctx.shadowBlur = 0;

  // Enemy bullets
  enemyBullets.forEach(b => {
    ctx.fillStyle = '#f44';
    ctx.shadowColor = '#f44';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.w, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.shadowBlur = 0;

  // Enemies
  enemies.forEach(e => {
    ctx.save();
    ctx.translate(e.x, e.y);
    switch (e.type) {
      case 'drone':
        ctx.fillStyle = '#f84';
        ctx.shadowColor = '#f84';
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.moveTo(0, -e.h);
        ctx.lineTo(-e.w, e.h);
        ctx.lineTo(e.w, e.h);
        ctx.closePath();
        ctx.fill();
        break;
      case 'zigzag':
        ctx.fillStyle = '#f4f';
        ctx.shadowColor = '#f4f';
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.moveTo(0, -e.h);
        ctx.lineTo(-e.w, 0);
        ctx.lineTo(0, e.h);
        ctx.lineTo(e.w, 0);
        ctx.closePath();
        ctx.fill();
        break;
      case 'bomber':
        ctx.fillStyle = '#ff4';
        ctx.shadowColor = '#ff4';
        ctx.shadowBlur = 10;
        ctx.fillRect(-e.w, -e.h, e.w * 2, e.h * 2);
        ctx.strokeStyle = '#fa0';
        ctx.lineWidth = 2;
        ctx.strokeRect(-e.w, -e.h, e.w * 2, e.h * 2);
        break;
    }
    ctx.restore();
  });
  ctx.shadowBlur = 0;

  // Boss
  if (boss) {
    ctx.save();
    ctx.translate(boss.x, boss.y);
    const hpRatio = boss.hp / boss.maxHp;
    const bossColor = hpRatio > 0.5 ? '#f0f' : hpRatio > 0.25 ? '#f80' : '#f00';
    ctx.fillStyle = bossColor;
    ctx.shadowColor = bossColor;
    ctx.shadowBlur = 20;
    // Body
    ctx.beginPath();
    ctx.moveTo(0, -boss.h);
    ctx.lineTo(-boss.w, boss.h * 0.5);
    ctx.lineTo(-boss.w * 0.6, boss.h);
    ctx.lineTo(boss.w * 0.6, boss.h);
    ctx.lineTo(boss.w, boss.h * 0.5);
    ctx.closePath();
    ctx.fill();
    // Wings
    ctx.fillStyle = bossColor;
    ctx.beginPath();
    ctx.moveTo(-boss.w * 0.5, 0);
    ctx.lineTo(-boss.w * 1.3, boss.h * 0.8);
    ctx.lineTo(-boss.w * 0.3, boss.h * 0.5);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(boss.w * 0.5, 0);
    ctx.lineTo(boss.w * 1.3, boss.h * 0.8);
    ctx.lineTo(boss.w * 0.3, boss.h * 0.5);
    ctx.closePath();
    ctx.fill();
    // Eye
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(0, 0, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#f00';
    ctx.beginPath();
    ctx.arc(0, 0, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    ctx.shadowBlur = 0;

    // Boss HP bar
    const barW = 200;
    const barH = 8;
    const barX = W / 2 - barW / 2;
    const barY = 50;
    ctx.fillStyle = '#333';
    ctx.fillRect(barX, barY, barW, barH);
    ctx.fillStyle = hpRatio > 0.5 ? '#f0f' : hpRatio > 0.25 ? '#f80' : '#f00';
    ctx.shadowColor = ctx.fillStyle;
    ctx.shadowBlur = 8;
    ctx.fillRect(barX, barY, barW * hpRatio, barH);
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.strokeRect(barX, barY, barW, barH);
    ctx.fillStyle = '#fff';
    ctx.font = '10px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('BOSS', W / 2, barY - 4);
  }

  // Player
  if (gameState === 'playing') {
    if (invulnTimer <= 0 || Math.floor(invulnTimer / 4) % 2 === 0) {
      ctx.save();
      ctx.translate(player.x, player.y);

      // Shield
      if (player.shield > 0) {
        const sa = player.shield < 120 ? Math.sin(player.shield * 0.2) * 0.5 + 0.5 : 0.6;
        ctx.strokeStyle = `rgba(0,255,255,${sa})`;
        ctx.shadowColor = '#0ff';
        ctx.shadowBlur = 15;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, 30, 0, Math.PI * 2);
        ctx.stroke();
        ctx.shadowBlur = 0;
      }

      // Ship - cyan triangle
      ctx.fillStyle = '#0ff';
      ctx.shadowColor = '#0ff';
      ctx.shadowBlur = 15;
      ctx.beginPath();
      ctx.moveTo(0, -player.h);
      ctx.lineTo(-player.w, player.h);
      ctx.lineTo(player.w, player.h);
      ctx.closePath();
      ctx.fill();

      // Engine glow
      const eGlow = Math.random() * 5 + 8;
      ctx.fillStyle = '#08f';
      ctx.shadowColor = '#08f';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.moveTo(-8, player.h);
      ctx.lineTo(8, player.h);
      ctx.lineTo(0, player.h + eGlow);
      ctx.closePath();
      ctx.fill();

      ctx.restore();
      ctx.shadowBlur = 0;
    }
  }

  // HUD
  ctx.fillStyle = '#0ff';
  ctx.shadowColor = '#0ff';
  ctx.shadowBlur = 4;
  ctx.font = 'bold 18px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText(`SCORE: ${score}`, 15, 30);
  ctx.textAlign = 'right';
  ctx.fillText(`HI: ${highScore}`, W - 15, 30);

  // Lives
  ctx.textAlign = 'left';
  for (let i = 0; i < lives; i++) {
    ctx.save();
    ctx.translate(20 + i * 25, 52);
    ctx.fillStyle = '#0ff';
    ctx.shadowColor = '#0ff';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.moveTo(0, -8);
    ctx.lineTo(-6, 8);
    ctx.lineTo(6, 8);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
  ctx.shadowBlur = 0;

  // Wave text
  if (waveTextStr && waveTextTimer > 0) {
    const alpha = waveTextTimer > 60 ? 1 : waveTextTimer / 60;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = waveTextStr.includes('BOSS') ? '#f44' : '#0ff';
    ctx.shadowColor = ctx.fillStyle;
    ctx.shadowBlur = 20;
    ctx.font = 'bold 36px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(waveTextStr, W / 2, H / 2 - 40);
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }

  // Active powerup indicators
  const indicators = [];
  if (player.spreadShot > 0) indicators.push({ label: 'SPREAD', color: '#f0f', t: player.spreadShot, max: 600 });
  if (player.shield > 0) indicators.push({ label: 'SHIELD', color: '#0ff', t: player.shield, max: 900 });
  if (player.speedBoost > 0) indicators.push({ label: 'SPEED', color: '#0f0', t: player.speedBoost, max: 480 });
  indicators.forEach((ind, i) => {
    const iy = 70 + i * 18;
    ctx.fillStyle = ind.color;
    ctx.font = '12px Courier New';
    ctx.textAlign = 'left';
    ctx.fillText(ind.label, 15, iy);
    ctx.fillStyle = '#333';
    ctx.fillRect(75, iy - 9, 60, 8);
    ctx.fillStyle = ind.color;
    ctx.fillRect(75, iy - 9, 60 * (ind.t / ind.max), 8);
  });

  // Paused
  if (paused) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#0ff';
    ctx.shadowColor = '#0ff';
    ctx.shadowBlur = 20;
    ctx.font = 'bold 48px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('PAUSED', W / 2, H / 2);
    ctx.shadowBlur = 0;
  }

  ctx.restore();
}

// Game loop
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

initStars();
loop();
</script>
</body>
</html>
