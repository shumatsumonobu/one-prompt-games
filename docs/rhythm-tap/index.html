<title>RHYTHM TAP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}
canvas{image-rendering:pixelated}
#gameCanvas{
  box-shadow:0 0 40px rgba(0,255,255,0.3),0 0 80px rgba(0,255,255,0.1),inset 0 0 40px rgba(0,255,255,0.05);
  border:2px solid rgba(0,255,255,0.2);
  border-radius:4px;
}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');

const ASPECT=4/3;
function resize(){
  const h=window.innerHeight*0.95;
  const w=h*ASPECT;
  if(w>window.innerWidth*0.95){
    canvas.style.width=(window.innerWidth*0.95)+'px';
    canvas.style.height=(window.innerWidth*0.95/ASPECT)+'px';
  }else{
    canvas.style.width=w+'px';
    canvas.style.height=h+'px';
  }
}
canvas.width=640;canvas.height=480;
resize();
window.addEventListener('resize',resize);

const LANE_COLORS=['#ff00ff','#00ffff','#ffff00','#00ff88'];
const LANE_NAMES=['←','↓','↑','→'];
const LANE_KEYS=['ArrowLeft','ArrowDown','ArrowUp','ArrowRight'];
const LANE_COUNT=4;
const LANE_W=80;
const TOTAL_W=LANE_W*LANE_COUNT;
const LANE_X0=(canvas.width-TOTAL_W)/2;
const HIT_Y=420;
const NOTE_H=20;
const NOTE_W=60;
const PERFECT_WINDOW=25;
const GOOD_WINDOW=50;

let state='title';
let score=0,combo=0,multiplier=1,lives=3,highScore=0;
let notes=[],particles=[],judgements=[],flashEffects=[];
let noteSpeed=3;
let speedTimer=0;
let lastTime=0;
let elapsed=0;
let spawnTimer=0;
let spawnInterval=600;
let patternIndex=0;
let pattern=[];
let keyState={};

try{highScore=parseInt(localStorage.getItem('rhythmTapHigh'))||0}catch(e){}

const audioCtx=new(window.AudioContext||window.webkitAudioContext)();

function playSound(freq,dur,type='square',vol=0.15){
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);
  o.start();o.stop(audioCtx.currentTime+dur);
}

function playPerfect(){playSound(880,0.1);playSound(1320,0.1,'square',0.1)}
function playGood(){playSound(660,0.08)}
function playMiss(){playSound(110,0.3,'sawtooth',0.12)}
function playGameOver(){
  playSound(440,0.15);
  setTimeout(()=>playSound(330,0.15),150);
  setTimeout(()=>playSound(220,0.4,'sawtooth',0.12),300);
}

function generatePattern(){
  const p=[];
  const len=16+Math.floor(Math.random()*16);
  for(let i=0;i<len;i++){
    p.push(Math.floor(Math.random()*LANE_COUNT));
  }
  return p;
}

function spawnNote(){
  const lane=pattern[patternIndex%pattern.length];
  patternIndex++;
  notes.push({lane,y:-NOTE_H,hit:false,missed:false});
}

function spawnParticles(x,y,color,count){
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=1+Math.random()*4;
    particles.push({
      x,y,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed,
      life:1,
      color,
      size:2+Math.random()*3
    });
  }
}

function showJudgement(lane,text,color){
  const x=LANE_X0+lane*LANE_W+LANE_W/2;
  judgements.push({x,y:HIT_Y-40,text,color,life:1});
}

function addFlash(lane,color){
  flashEffects.push({lane,life:1,color});
}

function tryHit(lane){
  if(state!=='playing')return;
  for(let i=0;i<notes.length;i++){
    const n=notes[i];
    if(n.lane!==lane||n.hit||n.missed)continue;
    const dist=Math.abs(n.y+NOTE_H/2-HIT_Y);
    if(dist<=GOOD_WINDOW){
      n.hit=true;
      const perfect=dist<=PERFECT_WINDOW;
      if(perfect){
        combo++;
        multiplier=1+Math.floor(combo/10);
        score+=100*multiplier;
        showJudgement(lane,'PERFECT!','#00ffff');
        spawnParticles(LANE_X0+lane*LANE_W+LANE_W/2,HIT_Y,LANE_COLORS[lane],20);
        addFlash(lane,LANE_COLORS[lane]);
        playPerfect();
      }else{
        combo++;
        multiplier=1+Math.floor(combo/10);
        score+=50*multiplier;
        showJudgement(lane,'GOOD','#ffff00');
        spawnParticles(LANE_X0+lane*LANE_W+LANE_W/2,HIT_Y,'#ffff00',8);
        addFlash(lane,'#ffff00');
        playGood();
      }
      return;
    }
  }
}

function resetGame(){
  score=0;combo=0;multiplier=1;lives=3;
  notes=[];particles=[];judgements=[];flashEffects=[];
  noteSpeed=3;speedTimer=0;elapsed=0;
  spawnTimer=0;spawnInterval=600;
  patternIndex=0;
  pattern=generatePattern();
}

document.addEventListener('keydown',e=>{
  if(e.repeat)return;
  if(state==='title'&&e.key==='Enter'){
    audioCtx.resume();
    resetGame();
    state='playing';
    return;
  }
  if(state==='gameover'&&e.key==='Enter'){
    state='title';
    return;
  }
  const li=LANE_KEYS.indexOf(e.key);
  if(li>=0){
    e.preventDefault();
    keyState[e.key]=true;
    tryHit(li);
  }
});
document.addEventListener('keyup',e=>{
  keyState[e.key]=false;
});

function drawScanlines(){
  ctx.fillStyle='rgba(0,0,0,0.12)';
  for(let y=0;y<canvas.height;y+=3){
    ctx.fillRect(0,y,canvas.width,1);
  }
}

function drawCRT(){
  const g=ctx.createRadialGradient(canvas.width/2,canvas.height/2,100,canvas.width/2,canvas.height/2,400);
  g.addColorStop(0,'rgba(0,0,0,0)');
  g.addColorStop(1,'rgba(0,0,0,0.4)');
  ctx.fillStyle=g;
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

function drawTitle(){
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  const t=performance.now()/1000;
  const glow=0.5+0.5*Math.sin(t*2);

  ctx.save();
  ctx.shadowColor='#00ffff';
  ctx.shadowBlur=20+glow*20;
  ctx.font='bold 56px monospace';
  ctx.textAlign='center';
  ctx.fillStyle=`rgba(0,255,255,${0.8+glow*0.2})`;
  ctx.fillText('RHYTHM TAP',canvas.width/2,180);
  ctx.restore();

  ctx.font='16px monospace';
  ctx.fillStyle='#888';
  ctx.textAlign='center';
  ctx.fillText('← ↓ ↑ → Arrow Keys',canvas.width/2,250);

  for(let i=0;i<4;i++){
    ctx.fillStyle=LANE_COLORS[i];
    ctx.font='bold 28px monospace';
    ctx.fillText(LANE_NAMES[i],canvas.width/2-75+i*50,310);
  }

  const blink=Math.sin(t*3)>0;
  if(blink){
    ctx.font='18px monospace';
    ctx.fillStyle='#fff';
    ctx.fillText('PRESS ENTER TO START',canvas.width/2,390);
  }

  if(highScore>0){
    ctx.font='14px monospace';
    ctx.fillStyle='#ff00ff';
    ctx.fillText('HIGH SCORE: '+highScore,canvas.width/2,430);
  }

  drawScanlines();
  drawCRT();
}

function drawGameOver(){
  ctx.fillStyle='rgba(0,0,0,0.85)';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.save();
  ctx.shadowColor='#ff0044';
  ctx.shadowBlur=30;
  ctx.font='bold 48px monospace';
  ctx.textAlign='center';
  ctx.fillStyle='#ff0044';
  ctx.fillText('GAME OVER',canvas.width/2,180);
  ctx.restore();

  ctx.font='24px monospace';
  ctx.fillStyle='#fff';
  ctx.fillText('SCORE: '+score,canvas.width/2,250);

  if(score>=highScore){
    ctx.fillStyle='#ffff00';
    ctx.font='18px monospace';
    ctx.fillText('NEW HIGH SCORE!',canvas.width/2,290);
  }

  ctx.font='14px monospace';
  ctx.fillStyle='#888';
  ctx.fillText('HIGH SCORE: '+highScore,canvas.width/2,330);

  const t=performance.now()/1000;
  if(Math.sin(t*3)>0){
    ctx.font='16px monospace';
    ctx.fillStyle='#fff';
    ctx.fillText('PRESS ENTER',canvas.width/2,390);
  }

  drawScanlines();
  drawCRT();
}

function drawGame(dt){
  ctx.fillStyle='#0a0a0a';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  for(let i=0;i<LANE_COUNT;i++){
    const x=LANE_X0+i*LANE_W;
    ctx.strokeStyle='rgba(255,255,255,0.06)';
    ctx.strokeRect(x,0,LANE_W,canvas.height);

    const grd=ctx.createLinearGradient(x,HIT_Y-30,x,HIT_Y+30);
    grd.addColorStop(0,'rgba('+hexToRgb(LANE_COLORS[i])+',0)');
    grd.addColorStop(0.5,'rgba('+hexToRgb(LANE_COLORS[i])+',0.15)');
    grd.addColorStop(1,'rgba('+hexToRgb(LANE_COLORS[i])+',0)');
    ctx.fillStyle=grd;
    ctx.fillRect(x,HIT_Y-30,LANE_W,60);
  }

  for(const f of flashEffects){
    const x=LANE_X0+f.lane*LANE_W;
    ctx.fillStyle=`rgba(${hexToRgb(f.color)},${f.life*0.4})`;
    ctx.fillRect(x,0,LANE_W,canvas.height);
  }

  for(let i=0;i<LANE_COUNT;i++){
    const x=LANE_X0+i*LANE_W;
    const pressed=keyState[LANE_KEYS[i]];
    ctx.save();
    ctx.shadowColor=LANE_COLORS[i];
    ctx.shadowBlur=pressed?15:5;
    ctx.strokeStyle=pressed?LANE_COLORS[i]:'rgba('+hexToRgb(LANE_COLORS[i])+',0.5)';
    ctx.lineWidth=pressed?3:2;
    ctx.beginPath();
    ctx.arc(x+LANE_W/2,HIT_Y,16,0,Math.PI*2);
    ctx.stroke();
    if(pressed){
      ctx.fillStyle='rgba('+hexToRgb(LANE_COLORS[i])+',0.3)';
      ctx.fill();
    }
    ctx.restore();

    ctx.font='bold 14px monospace';
    ctx.textAlign='center';
    ctx.fillStyle=pressed?LANE_COLORS[i]:'rgba('+hexToRgb(LANE_COLORS[i])+',0.6)';
    ctx.fillText(LANE_NAMES[i],x+LANE_W/2,HIT_Y+5);
  }

  for(const n of notes){
    if(n.hit)continue;
    const x=LANE_X0+n.lane*LANE_W+(LANE_W-NOTE_W)/2;
    const col=LANE_COLORS[n.lane];
    ctx.save();
    ctx.shadowColor=col;
    ctx.shadowBlur=n.missed?0:12;
    ctx.fillStyle=n.missed?'#333':col;
    ctx.beginPath();
    roundRect(ctx,x,n.y,NOTE_W,NOTE_H,6);
    ctx.fill();
    if(!n.missed){
      ctx.fillStyle='rgba(255,255,255,0.3)';
      ctx.beginPath();
      roundRect(ctx,x+4,n.y+2,NOTE_W-8,NOTE_H/2-2,3);
      ctx.fill();
    }
    ctx.restore();
  }

  for(const p of particles){
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
  }
  ctx.globalAlpha=1;

  for(const j of judgements){
    ctx.save();
    ctx.globalAlpha=j.life;
    ctx.shadowColor=j.color;
    ctx.shadowBlur=10;
    ctx.font='bold 16px monospace';
    ctx.textAlign='center';
    ctx.fillStyle=j.color;
    ctx.fillText(j.text,j.x,j.y);
    ctx.restore();
  }

  ctx.font='bold 14px monospace';
  ctx.textAlign='left';
  ctx.fillStyle='#fff';
  ctx.fillText('SCORE',20,30);
  ctx.fillStyle='#00ffff';
  ctx.fillText(score.toString().padStart(8,'0'),20,48);

  ctx.fillStyle='#fff';
  ctx.textAlign='right';
  ctx.fillText('HIGH',canvas.width-20,30);
  ctx.fillStyle='#ff00ff';
  ctx.fillText(highScore.toString().padStart(8,'0'),canvas.width-20,48);

  if(combo>1){
    ctx.textAlign='center';
    ctx.save();
    ctx.shadowColor='#ffff00';
    ctx.shadowBlur=10;
    ctx.font='bold 20px monospace';
    ctx.fillStyle='#ffff00';
    ctx.fillText(combo+' COMBO',canvas.width/2,40);
    if(multiplier>1){
      ctx.font='14px monospace';
      ctx.fillStyle='#ff8800';
      ctx.fillText('x'+multiplier,canvas.width/2,58);
    }
    ctx.restore();
  }

  for(let i=0;i<3;i++){
    const lx=20+i*22;
    ctx.font='16px monospace';
    ctx.textAlign='left';
    ctx.fillStyle=i<lives?'#ff0044':'#333';
    ctx.fillText('♥',lx,72);
  }

  drawScanlines();
  drawCRT();
}

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return r+','+g+','+b;
}

function roundRect(ctx,x,y,w,h,r){
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
}

function update(dt){
  if(state!=='playing')return;

  elapsed+=dt;
  speedTimer+=dt;

  if(speedTimer>=30000){
    speedTimer-=30000;
    noteSpeed+=0.5;
    if(spawnInterval>300)spawnInterval-=40;
  }

  spawnTimer+=dt;
  if(spawnTimer>=spawnInterval){
    spawnTimer-=spawnInterval;
    spawnNote();
  }

  for(const n of notes){
    if(n.hit)continue;
    n.y+=noteSpeed*(dt/16);
    if(!n.missed&&n.y>HIT_Y+GOOD_WINDOW){
      n.missed=true;
      combo=0;multiplier=1;
      lives--;
      showJudgement(n.lane,'MISS','#ff0044');
      playMiss();
      if(lives<=0){
        if(score>highScore){
          highScore=score;
          try{localStorage.setItem('rhythmTapHigh',highScore)}catch(e){}
        }
        state='gameover';
        playGameOver();
      }
    }
  }

  notes=notes.filter(n=>n.y<canvas.height+50);

  for(const p of particles){
    p.x+=p.vx;
    p.y+=p.vy;
    p.vy+=0.1;
    p.life-=0.025;
  }
  particles=particles.filter(p=>p.life>0);

  for(const j of judgements){
    j.y-=0.8;
    j.life-=0.025;
  }
  judgements=judgements.filter(j=>j.life>0);

  for(const f of flashEffects){
    f.life-=0.05;
  }
  flashEffects=flashEffects.filter(f=>f.life>0);
}

function gameLoop(time){
  const dt=lastTime?Math.min(time-lastTime,50):16;
  lastTime=time;

  update(dt);

  if(state==='title')drawTitle();
  else if(state==='gameover')drawGameOver();
  else drawGame(dt);

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
