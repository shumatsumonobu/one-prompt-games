<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON TETRIS</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  font-family: monospace;
}
canvas {
  image-rendering: pixelated;
  box-shadow: 0 0 40px rgba(0,255,255,0.3), 0 0 80px rgba(0,255,255,0.1), inset 0 0 40px rgba(0,0,0,0.5);
  border: 2px solid rgba(0,255,255,0.4);
  border-radius: 8px;
}
.crt {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 10;
  background: repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0.15) 0px,
    rgba(0,0,0,0.15) 1px,
    transparent 1px,
    transparent 3px
  );
}
.glow {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 110%; height: 110%;
  pointer-events: none;
  z-index: 5;
  background: radial-gradient(ellipse at center, rgba(0,255,255,0.03) 0%, transparent 70%);
}
</style>
</head>
<body>
<div class="crt"></div>
<div class="glow"></div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const ASPECT = 4 / 3;
function resize() {
  let h = window.innerHeight * 0.92;
  let w = h * ASPECT;
  if (w > window.innerWidth * 0.92) {
    w = window.innerWidth * 0.92;
    h = w / ASPECT;
  }
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
}
canvas.width = 640;
canvas.height = 480;
resize();
window.addEventListener('resize', resize);

const COLS = 10, ROWS = 20;
const BLOCK = 20;
const BOARD_X = 40;
const BOARD_Y = 30;
const BOARD_W = COLS * BLOCK;
const BOARD_H = ROWS * BLOCK;

const COLORS = {
  I: '#00ffff',
  O: '#ffff00',
  T: '#ff00ff',
  S: '#00ff00',
  Z: '#ff0000',
  J: '#0088ff',
  L: '#ff8800'
};

const SHAPES = {
  I: [[0,0],[1,0],[2,0],[3,0]],
  O: [[0,0],[1,0],[0,1],[1,1]],
  T: [[0,0],[1,0],[2,0],[1,1]],
  S: [[1,0],[2,0],[0,1],[1,1]],
  Z: [[0,0],[1,0],[1,1],[2,1]],
  J: [[0,0],[0,1],[1,1],[2,1]],
  L: [[2,0],[0,1],[1,1],[2,1]]
};

const PIECE_NAMES = ['I','O','T','S','Z','J','L'];

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(freq, duration, type = 'square', vol = 0.1) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playMove() { playSound(200, 0.05); }
function playRotate() { playSound(400, 0.08); }
function playDrop() { playSound(150, 0.15, 'triangle', 0.15); }
function playLineClear() {
  playSound(523, 0.1); setTimeout(() => playSound(659, 0.1), 80);
  setTimeout(() => playSound(784, 0.15), 160);
}
function playTetris() {
  playSound(523, 0.1); setTimeout(() => playSound(659, 0.08), 60);
  setTimeout(() => playSound(784, 0.08), 120); setTimeout(() => playSound(1047, 0.2), 180);
}
function playGameOver() {
  playSound(300, 0.2, 'sawtooth', 0.12);
  setTimeout(() => playSound(200, 0.3, 'sawtooth', 0.1), 200);
  setTimeout(() => playSound(100, 0.5, 'sawtooth', 0.08), 400);
}
function playLoseLife() {
  playSound(400, 0.15, 'sawtooth', 0.1);
  setTimeout(() => playSound(250, 0.25, 'sawtooth', 0.08), 150);
}

let board, score, level, lines, lives, highScore, gameState;
let currentPiece, nextPiece, dropTimer, dropInterval;
let flashLines, flashTimer;
let dasTimer, dasDir, dasDelay, dasRepeat;
let softDropping;
let lockDelay, lockTimer, lockMoves;

function init() {
  board = Array.from({length: ROWS}, () => Array(COLS).fill(null));
  score = 0; level = 1; lines = 0; lives = 3;
  highScore = parseInt(localStorage.getItem('tetris_highscore') || '0');
  dropInterval = 1000;
  dropTimer = 0;
  flashLines = []; flashTimer = 0;
  dasTimer = 0; dasDir = 0; dasDelay = 170; dasRepeat = 50;
  softDropping = false;
  lockDelay = 500; lockTimer = 0; lockMoves = 0;
  currentPiece = null; nextPiece = null;
  spawnPiece();
}

function createPiece(name) {
  const cells = SHAPES[name].map(c => [...c]);
  return { name, cells, x: 3, y: 0, color: COLORS[name] };
}

function spawnPiece() {
  if (!nextPiece) nextPiece = createPiece(PIECE_NAMES[Math.floor(Math.random() * 7)]);
  currentPiece = nextPiece;
  currentPiece.x = Math.floor((COLS - getWidth(currentPiece)) / 2);
  currentPiece.y = 0;
  nextPiece = createPiece(PIECE_NAMES[Math.floor(Math.random() * 7)]);
  lockTimer = 0; lockMoves = 0;
  dropTimer = 0;

  if (!isValid(currentPiece, currentPiece.x, currentPiece.y)) {
    lives--;
    playLoseLife();
    if (lives <= 0) {
      gameState = 'gameover';
      if (score > highScore) { highScore = score; localStorage.setItem('tetris_highscore', highScore); }
      playGameOver();
      return;
    }
    partialClear();
    currentPiece.y = 0;
    if (!isValid(currentPiece, currentPiece.x, currentPiece.y)) {
      partialClear();
    }
  }
}

function partialClear() {
  for (let r = 0; r < 10; r++) {
    board[r] = Array(COLS).fill(null);
  }
}

function getWidth(piece) {
  return Math.max(...piece.cells.map(c => c[0])) + 1;
}

function isValid(piece, px, py) {
  for (const [cx, cy] of piece.cells) {
    const x = px + cx, y = py + cy;
    if (x < 0 || x >= COLS || y >= ROWS) return false;
    if (y >= 0 && board[y][x]) return false;
  }
  return true;
}

function rotatePiece(piece) {
  const maxX = Math.max(...piece.cells.map(c => c[0]));
  const maxY = Math.max(...piece.cells.map(c => c[1]));
  const cx = maxX / 2, cy = maxY / 2;
  const rotated = piece.cells.map(([x, y]) => [
    Math.round(cx + (y - cy)),
    Math.round(cy - (x - cx))
  ]);
  const minX = Math.min(...rotated.map(c => c[0]));
  const minY = Math.min(...rotated.map(c => c[1]));
  return rotated.map(([x, y]) => [x - minX, y - minY]);
}

function tryRotate() {
  if (currentPiece.name === 'O') return;
  const newCells = rotatePiece(currentPiece);
  const old = currentPiece.cells;
  currentPiece.cells = newCells;

  const kicks = [0, -1, 1, -2, 2];
  for (const kick of kicks) {
    if (isValid(currentPiece, currentPiece.x + kick, currentPiece.y)) {
      currentPiece.x += kick;
      playRotate();
      if (isOnGround()) { lockTimer = 0; lockMoves++; }
      return;
    }
    if (isValid(currentPiece, currentPiece.x + kick, currentPiece.y - 1)) {
      currentPiece.x += kick;
      currentPiece.y -= 1;
      playRotate();
      if (isOnGround()) { lockTimer = 0; lockMoves++; }
      return;
    }
  }
  currentPiece.cells = old;
}

function isOnGround() {
  return !isValid(currentPiece, currentPiece.x, currentPiece.y + 1);
}

function lockPiece() {
  for (const [cx, cy] of currentPiece.cells) {
    const x = currentPiece.x + cx, y = currentPiece.y + cy;
    if (y >= 0 && y < ROWS) board[y][x] = currentPiece.color;
  }
  playDrop();
  checkLines();
}

function checkLines() {
  const cleared = [];
  for (let r = 0; r < ROWS; r++) {
    if (board[r].every(c => c !== null)) cleared.push(r);
  }
  if (cleared.length > 0) {
    flashLines = cleared;
    flashTimer = 300;
    const pts = [0, 100, 300, 500, 800][cleared.length] || 800;
    score += pts * level;
    lines += cleared.length;
    level = Math.floor(lines / 10) + 1;
    dropInterval = Math.max(50, 1000 - (level - 1) * 80);
    if (cleared.length === 4) playTetris(); else playLineClear();
    if (score > highScore) { highScore = score; localStorage.setItem('tetris_highscore', highScore); }
  } else {
    spawnPiece();
  }
}

function clearFlashedLines() {
  for (const r of flashLines.sort((a, b) => b - a)) {
    board.splice(r, 1);
    board.unshift(Array(COLS).fill(null));
  }
  flashLines = [];
  spawnPiece();
}

function getGhostY() {
  let gy = currentPiece.y;
  while (isValid(currentPiece, currentPiece.x, gy + 1)) gy++;
  return gy;
}

function hardDrop() {
  let dropped = 0;
  while (isValid(currentPiece, currentPiece.x, currentPiece.y + 1)) {
    currentPiece.y++;
    dropped++;
  }
  score += dropped * 2;
  lockPiece();
}

const keys = {};
document.addEventListener('keydown', e => {
  if (e.repeat && (e.key === 'ArrowUp' || e.key === ' ')) return;
  keys[e.key] = true;

  if (gameState === 'title' && e.key === 'Enter') {
    audioCtx.resume();
    gameState = 'playing';
    init();
    return;
  }
  if (gameState === 'gameover' && e.key === 'Enter') {
    gameState = 'playing';
    init();
    return;
  }
  if (gameState !== 'playing' || flashLines.length > 0) return;

  if (e.key === 'ArrowLeft') {
    if (isValid(currentPiece, currentPiece.x - 1, currentPiece.y)) {
      currentPiece.x--;
      playMove();
      if (isOnGround()) { lockTimer = 0; lockMoves++; }
    }
    dasDir = -1; dasTimer = dasDelay;
  }
  if (e.key === 'ArrowRight') {
    if (isValid(currentPiece, currentPiece.x + 1, currentPiece.y)) {
      currentPiece.x++;
      playMove();
      if (isOnGround()) { lockTimer = 0; lockMoves++; }
    }
    dasDir = 1; dasTimer = dasDelay;
  }
  if (e.key === 'ArrowUp') tryRotate();
  if (e.key === ' ') { hardDrop(); e.preventDefault(); }
  if (e.key === 'ArrowDown') softDropping = true;
});

document.addEventListener('keyup', e => {
  keys[e.key] = false;
  if (e.key === 'ArrowLeft' && dasDir === -1) dasDir = 0;
  if (e.key === 'ArrowRight' && dasDir === 1) dasDir = 0;
  if (e.key === 'ArrowDown') softDropping = false;
});

function drawBlock(x, y, color, alpha = 1) {
  const px = BOARD_X + x * BLOCK;
  const py = BOARD_Y + y * BLOCK;
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.fillRect(px + 1, py + 1, BLOCK - 2, BLOCK - 2);
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillRect(px + 1, py + 1, BLOCK - 2, 3);
  ctx.fillRect(px + 1, py + 1, 3, BLOCK - 2);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(px + 1, py + BLOCK - 4, BLOCK - 2, 3);
  ctx.fillRect(px + BLOCK - 4, py + 1, 3, BLOCK - 2);
  ctx.globalAlpha = 1;
}

function drawBoard() {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(BOARD_X, BOARD_Y, BOARD_W, BOARD_H);

  ctx.strokeStyle = 'rgba(0,255,255,0.08)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath();
    ctx.moveTo(BOARD_X + x * BLOCK, BOARD_Y);
    ctx.lineTo(BOARD_X + x * BLOCK, BOARD_Y + BOARD_H);
    ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath();
    ctx.moveTo(BOARD_X, BOARD_Y + y * BLOCK);
    ctx.lineTo(BOARD_X + BOARD_W, BOARD_Y + y * BLOCK);
    ctx.stroke();
  }

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (board[r][c]) {
        if (flashLines.includes(r)) {
          const flash = Math.sin(flashTimer * 0.03) > 0;
          drawBlock(c, r, flash ? '#ffffff' : board[r][c]);
        } else {
          drawBlock(c, r, board[r][c]);
        }
      }
    }
  }

  ctx.strokeStyle = 'rgba(0,255,255,0.5)';
  ctx.lineWidth = 2;
  ctx.strokeRect(BOARD_X, BOARD_Y, BOARD_W, BOARD_H);
}

function drawPiece() {
  if (!currentPiece) return;
  const ghostY = getGhostY();
  for (const [cx, cy] of currentPiece.cells) {
    if (ghostY + cy >= 0) drawBlock(currentPiece.x + cx, ghostY + cy, currentPiece.color, 0.2);
  }
  for (const [cx, cy] of currentPiece.cells) {
    if (currentPiece.y + cy >= 0) drawBlock(currentPiece.x + cx, currentPiece.y + cy, currentPiece.color);
  }
}

function drawNextPiece() {
  const nx = BOARD_X + BOARD_W + 30;
  const ny = BOARD_Y + 40;
  ctx.fillStyle = '#00ffff';
  ctx.font = '14px monospace';
  ctx.fillText('NEXT', nx, ny - 15);

  ctx.fillStyle = 'rgba(0,255,255,0.1)';
  ctx.fillRect(nx - 5, ny - 5, 90, 70);
  ctx.strokeStyle = 'rgba(0,255,255,0.3)';
  ctx.strokeRect(nx - 5, ny - 5, 90, 70);

  if (nextPiece) {
    for (const [cx, cy] of nextPiece.cells) {
      const bx = nx + cx * 18 + 10;
      const by = ny + cy * 18 + 10;
      ctx.fillStyle = nextPiece.color;
      ctx.fillRect(bx, by, 16, 16);
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fillRect(bx, by, 16, 3);
      ctx.fillRect(bx, by, 3, 16);
    }
  }
}

function drawHUD() {
  const nx = BOARD_X + BOARD_W + 30;
  ctx.fillStyle = '#00ffff';
  ctx.font = '14px monospace';

  ctx.fillText('SCORE', nx, BOARD_Y + 140);
  ctx.fillStyle = '#ffffff';
  ctx.fillText(score.toString().padStart(8, '0'), nx, BOARD_Y + 158);

  ctx.fillStyle = '#00ffff';
  ctx.fillText('LEVEL', nx, BOARD_Y + 190);
  ctx.fillStyle = '#ffffff';
  ctx.fillText(level.toString(), nx, BOARD_Y + 208);

  ctx.fillStyle = '#00ffff';
  ctx.fillText('LINES', nx, BOARD_Y + 240);
  ctx.fillStyle = '#ffffff';
  ctx.fillText(lines.toString(), nx, BOARD_Y + 258);

  ctx.fillStyle = '#00ffff';
  ctx.fillText('LIVES', nx, BOARD_Y + 290);
  ctx.fillStyle = '#ff4444';
  for (let i = 0; i < lives; i++) {
    ctx.fillText('♥', nx + i * 18, BOARD_Y + 308);
  }

  ctx.fillStyle = '#00ffff';
  ctx.fillText('HIGH', nx, BOARD_Y + 350);
  ctx.fillStyle = '#ffff00';
  ctx.fillText(highScore.toString().padStart(8, '0'), nx, BOARD_Y + 368);
}

function drawTitle() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.shadowColor = '#00ffff';
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#00ffff';
  ctx.font = 'bold 48px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('NEON TETRIS', canvas.width / 2, 160);
  ctx.restore();

  ctx.fillStyle = '#ff00ff';
  ctx.font = 'bold 36px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('NEON TETRIS', canvas.width / 2, 160);

  const t = Date.now() * 0.003;
  ctx.globalAlpha = 0.5 + Math.sin(t) * 0.5;
  ctx.fillStyle = '#00ffff';
  ctx.font = '16px monospace';
  ctx.fillText('PRESS ENTER TO START', canvas.width / 2, 280);
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#888';
  ctx.font = '12px monospace';
  ctx.fillText('← → ↓  MOVE  |  ↑ ROTATE  |  SPACE  HARD DROP', canvas.width / 2, 360);
  ctx.textAlign = 'left';

  highScore = parseInt(localStorage.getItem('tetris_highscore') || '0');
  if (highScore > 0) {
    ctx.fillStyle = '#ffff00';
    ctx.font = '14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('HIGH SCORE: ' + highScore, canvas.width / 2, 320);
    ctx.textAlign = 'left';
  }
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.shadowColor = '#ff0000';
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#ff0000';
  ctx.font = 'bold 36px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', canvas.width / 2, 180);
  ctx.restore();

  ctx.fillStyle = '#ffffff';
  ctx.font = '18px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SCORE: ' + score, canvas.width / 2, 230);

  if (score >= highScore) {
    ctx.fillStyle = '#ffff00';
    ctx.fillText('NEW HIGH SCORE!', canvas.width / 2, 260);
  }

  const t = Date.now() * 0.003;
  ctx.globalAlpha = 0.5 + Math.sin(t) * 0.5;
  ctx.fillStyle = '#00ffff';
  ctx.font = '14px monospace';
  ctx.fillText('PRESS ENTER TO RETRY', canvas.width / 2, 310);
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

let lastTime = 0;
gameState = 'title';

function update(dt) {
  if (gameState !== 'playing') return;

  if (flashLines.length > 0) {
    flashTimer -= dt;
    if (flashTimer <= 0) clearFlashedLines();
    return;
  }

  if (dasDir !== 0) {
    dasTimer -= dt;
    if (dasTimer <= 0) {
      if (isValid(currentPiece, currentPiece.x + dasDir, currentPiece.y)) {
        currentPiece.x += dasDir;
        playMove();
        if (isOnGround()) { lockTimer = 0; lockMoves++; }
      }
      dasTimer = dasRepeat;
    }
  }

  const effectiveInterval = softDropping ? Math.min(dropInterval, 50) : dropInterval;

  if (isOnGround()) {
    lockTimer += dt;
    if (lockTimer >= lockDelay || lockMoves >= 15) {
      lockPiece();
      return;
    }
  } else {
    lockTimer = 0;
  }

  dropTimer += dt;
  if (dropTimer >= effectiveInterval) {
    dropTimer = 0;
    if (isValid(currentPiece, currentPiece.x, currentPiece.y + 1)) {
      currentPiece.y++;
      if (softDropping) score += 1;
    }
  }
}

function render() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (gameState === 'title') {
    drawTitle();
    return;
  }

  drawBoard();
  if (flashLines.length === 0) drawPiece();
  drawNextPiece();
  drawHUD();

  if (gameState === 'gameover') drawGameOver();
}

function loop(time) {
  const dt = time - lastTime;
  lastTime = time;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
